syntax = "proto3";

package subscription;

enum EventType {
    WORKSHOP = 0;
    CONFERENCE = 1;
    MEETUP = 2;
    HACKATHON = 3;
}

enum SkillLevel {
    BEGINNER = 0;
    INTERMEDIATE = 1;
    ADVANCED = 2;
}

message Location {
    string city = 1;
    string country = 2;
}

message Event {
    string id = 1;
    string title = 2;
    EventType category = 3;
    SkillLevel skill_level = 4;
    Location location = 5;
    string date = 6;
}

message SubscriptionRequest {
    string client_id = 1;
    repeated SkillLevel skill_level = 2;
    repeated EventType categories = 3;
}

message UnsubscribeRequest {
    string client_id = 1;
    repeated SkillLevel skill_level = 2;
    repeated EventType categories = 3;
}


message UnsubscribeResponse {
    bool success = 1;
}


message RemoveSubscriptionRequest {
    string client_id = 1;
    repeated SkillLevel skill_level = 2;
    repeated EventType categories = 3;
}

message RemoveSubscriptionResponse {
    bool success = 1;
}

message AddSubscriptionsRequest {
    string client_id = 1;
    repeated SkillLevel skill_level = 2;
    repeated EventType categories = 3;
}

message AddSubscriptionsResponse {
    bool success = 1;
}

service NotificationService {
    rpc Subscribe(SubscriptionRequest) returns (stream Event);
    rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
    rpc RemoveSubscription(RemoveSubscriptionRequest) returns (RemoveSubscriptionResponse);
    rpc AddSubscriptions(AddSubscriptionsRequest) returns (AddSubscriptionsResponse);
}
