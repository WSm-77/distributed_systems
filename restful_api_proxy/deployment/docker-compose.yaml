services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: restful-api-proxy-backend
    working_dir: /app
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "server:server",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    ports:
      - "8000:8000"
    environment:
      OLLAMA_API: http://ollama:11434/api/chat
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: restful-api-proxy-frontend
    working_dir: /app
    command:
      [
        "npm",
        "run",
        "dev"
      ]
    ports:
      - "4321:4321"
    environment:
      PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
volumes:
  ollama_data:
    name: ollama_data
