services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: restful-api-proxy-backend
    working_dir: /app
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "server:server",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: restful-api-proxy-frontend
    working_dir: /app
    command:
      [
        "npm",
        "run",
        "dev"
      ]
    ports:
      - "4321:4321"
    # volumes:
      # - ../frontend:/app
      # - frontend_node_modules:/app/node_modules
    environment:
      PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

